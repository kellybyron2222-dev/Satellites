<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Satellite Tracking Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Widgets/widgets.css"
    />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        background: #020617;
      }

      body {
        color: #eff6ff;
      }

      #cesiumContainer {
        position: fixed;
        inset: 0;
      }

      .overlay {
        position: fixed;
        top: 18px;
        left: 18px;
        width: min(360px, calc(100vw - 36px));
        max-height: calc(100vh - 36px);
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 16px;
        background: rgba(8, 15, 30, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.35);
        backdrop-filter: blur(12px);
        z-index: 10;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.12);
        border: 1px solid rgba(56, 189, 248, 0.25);
        color: #bae6fd;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 1.15rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #dbeafe;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .metric-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      .metric-label {
        color: #bfdbfe;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .metric-value {
        font-size: 1.5rem;
        font-weight: 700;
        color: #f8fafc;
      }

      .status {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.12);
        color: #bfdbfe;
        font-size: 0.92rem;
      }

      .satellite-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow: auto;
        padding-right: 2px;
      }

      .satellite-item {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 8px 10px;
        padding: 10px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(125, 211, 252, 0.12);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-top: 4px;
        box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.18);
      }

      .sat-name {
        font-size: 0.95rem;
        color: #eff6ff;
      }

      .sat-meta {
        color: #cbd5e1;
        font-size: 0.82rem;
      }

      .legend {
        color: #bfdbfe;
        font-size: 0.82rem;
      }

      @media (max-width: 900px) {
        .overlay {
          width: calc(100vw - 18px);
          top: 8px;
          left: 8px;
          max-height: calc(100vh - 16px);
        }
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>

    <aside class="overlay">
      <span class="badge">GitHub Pages Ready</span>
      <div>
        <h1>3D Satellite Tracking Dashboard</h1>
        <p>Live LEO / VLEO satellite positions over a Cesium globe, deduplicated from Celestrak and Ivan Stanojevic TLE sources.</p>
      </div>

      <div class="metric-card">
        <span class="metric-label">Total Satellites Tracked</span>
        <strong id="satelliteCount" class="metric-value">0</strong>
      </div>

      <div id="status" class="status">Loading TLE data from both sources…</div>
      <div class="legend">Bright markers update in real time on the globe every second.</div>
      <div id="satelliteList" class="satellite-list"></div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.0/dist/satellite.min.js"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Cesium.js"></script>
    <script>
      const satCountEl = document.getElementById('satelliteCount');
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('satelliteList');
      const satelliteMap = new Map();
      const RAD2DEG = 180 / Math.PI;
      const palette = ['#38bdf8', '#22d3ee', '#8b5cf6', '#f472b6', '#facc15', '#4ade80'];

      function colorForId(id) {
        const index = Number(id) % palette.length;
        return Cesium.Color.fromCssColorString(palette[index]);
      }

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function renderSatelliteList() {
        const items = [...satelliteMap.values()].sort((a, b) => a.name.localeCompare(b.name));
        satCountEl.textContent = String(items.length);

        if (!items.length) {
          listEl.innerHTML = '<div class="satellite-item"><div class="dot" style="background:#38bdf8"></div><span class="sat-name">No satellites loaded yet.</span></div>';
          return;
        }

        listEl.innerHTML = items
          .slice(0, 120)
          .map((entry) => {
            const altText = entry.altitudeKm != null ? `${entry.altitudeKm.toFixed(1)} km` : 'tracking';
            const positionText = entry.latitude != null && entry.longitude != null
              ? `${entry.latitude.toFixed(2)}°, ${entry.longitude.toFixed(2)}°`
              : 'position pending';
            return `
              <article class="satellite-item">
                <span class="dot" style="background:${entry.colorCss}"></span>
                <div>
                  <div class="sat-name">${entry.name}</div>
                  <div class="sat-meta">NORAD ${entry.noradId} • ${positionText} • ${altText}</div>
                </div>
              </article>
            `;
          })
          .join('');
      }

      function parseCelestrakTLE(rawText) {
        const records = [];
        const lines = rawText
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);

        for (let i = 0; i < lines.length - 2; i += 3) {
          const name = lines[i] || 'Unknown Satellite';
          const line1 = lines[i + 1];
          const line2 = lines[i + 2];
          if (!line1 || !line2 || !line1.startsWith('1 ') || !line2.startsWith('2 ')) continue;

          const noradId = String(line1.slice(2, 7)).trim();
          if (!noradId) continue;

          records.push({
            noradId,
            name,
            line1,
            line2,
            source: 'Celestrak'
          });
        }
        return records;
      }

      function normalizeIvanRecord(entry) {
        const candidates = [
          entry?.norad_id,
          entry?.noradId,
          entry?.satellite_id,
          entry?.id,
          entry?.catalog_number
        ];
        const noradId = candidates.find((value) => value != null && String(value).trim()) || '';
        const line1 = entry?.tle_line1 || entry?.line1 || entry?.tle?.line1 || entry?.tle_line_1;
        const line2 = entry?.tle_line2 || entry?.line2 || entry?.tle?.line2 || entry?.tle_line_2;
        const name = entry?.name || entry?.satellite_name || 'Unknown Satellite';

        if (!noradId || !line1 || !line2) return null;
        return { noradId: String(noradId).trim(), name, line1, line2, source: 'Ivan Stanojevic' };
      }

      async function fetchIvanTLE() {
        const urls = [
          'https://api.ivanstanojevic.me/tle/',
          'https://ivanstanojevic.me/api/tle/'
        ];

        for (const url of urls) {
          try {
            const response = await fetch(url, { headers: { Accept: 'application/json' } });
            if (!response.ok) continue;

            const payload = await response.json();
            const candidates = Array.isArray(payload)
              ? payload
              : Array.isArray(payload.results)
                ? payload.results
                : Array.isArray(payload.data)
                  ? payload.data
                  : [payload];

            return candidates
              .map(normalizeIvanRecord)
              .filter(Boolean);
          } catch (error) {
            console.warn('Ivan TLE endpoint unavailable:', url, error);
          }
        }

        return [];
      }

      async function fetchCelestrakTLE() {
        const response = await fetch('https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=tle');
        if (!response.ok) {
          throw new Error('Celestrak fetch failed');
        }
        return parseCelestrakTLE(await response.text());
      }

      function storeRecord(record) {
        const key = String(record.noradId).padStart(5, '0');
        const existing = satelliteMap.get(key);

        if (existing) {
          existing.name = record.name || existing.name;
          existing.line1 = record.line1 || existing.line1;
          existing.line2 = record.line2 || existing.line2;
          existing.source = existing.source || record.source;
          return existing;
        }

        const entry = {
          noradId: key,
          name: record.name || `Satellite ${key}`,
          line1: record.line1,
          line2: record.line2,
          source: record.source,
          colorCss: palette[Number(key) % palette.length],
          altitudeKm: null,
          latitude: null,
          longitude: null,
          entity: null
        };

        satelliteMap.set(key, entry);
        return entry;
      }

      function addSatelliteEntity(entry) {
        const color = Cesium.Color.fromCssColorString(entry.colorCss);
        const entity = viewer.entities.add({
          name: entry.name,
          position: Cesium.Cartesian3.ZERO,
          point: {
            pixelSize: 8,
            color,
            outlineColor: Cesium.Color.WHITE.withAlpha(0.85),
            outlineWidth: 1,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
          },
          label: {
            text: entry.name,
            font: '12px sans-serif',
            fillColor: Cesium.Color.WHITE,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            outlineWidth: 1,
            pixelOffset: new Cesium.Cartesian2(0, -18),
            showBackground: true,
            backgroundColor: Cesium.Color.BLACK.withAlpha(0.45)
          }
        });
        entry.entity = entity;
      }

      function updateEntryPosition(entry, date) {
        try {
          const satrec = satellite.twoline2satrec(entry.line1, entry.line2);
          const positionAndVelocity = satellite.propagate(satrec, date);
          const positionEci = positionAndVelocity.position;
          if (!positionEci) return;
          const gmst = satellite.gstime(date);
          const geodetic = satellite.eciToGeodetic(positionEci, gmst);
          const longitude = geodetic.longitude * RAD2DEG;
          const latitude = geodetic.latitude * RAD2DEG;
          const altitudeKm = geodetic.height;

          entry.latitude = latitude;
          entry.longitude = longitude;
          entry.altitudeKm = altitudeKm;

          if (entry.entity) {
            entry.entity.position = Cesium.Cartesian3.fromDegrees(longitude, latitude, altitudeKm * 1000);
            entry.entity.label.show = true;
          }
        } catch (error) {
          console.warn('Unable to compute satellite position for', entry.name, error);
        }
      }

      function updateTrackedSatellites() {
        const now = new Date();
        for (const entry of satelliteMap.values()) {
          updateEntryPosition(entry, now);
        }
        renderSatelliteList();
      }

      let lastRefresh = 0;
      function animate(now) {
        if (now - lastRefresh >= 1000) {
          lastRefresh = now;
          updateTrackedSatellites();
        }
        requestAnimationFrame(animate);
      }

      async function bootstrap() {
        try {
          setStatus('Fetching TLE data from Celestrak and Ivan Stanojevic…');
          const [celestrakRecords, ivanRecords] = await Promise.all([fetchCelestrakTLE(), fetchIvanTLE()]);

          const merged = new Map();
          [...celestrakRecords, ...ivanRecords].forEach((record) => {
            const key = String(record.noradId).padStart(5, '0');
            const entry = record;
            if (!merged.has(key)) {
              merged.set(key, entry);
            }
          });

          merged.forEach((record) => {
            const entry = storeRecord(record);
            if (!entry.entity) addSatelliteEntity(entry);
          });

          setStatus(`Loaded ${satelliteMap.size} satellites from both TLE sources.`);
          renderSatelliteList();
          updateTrackedSatellites();
          requestAnimationFrame(animate);
        } catch (error) {
          console.error(error);
          setStatus('TLE loading failed. Please refresh or check the live endpoints.');
        }
      }

      const viewer = new Cesium.Viewer('cesiumContainer', {
        animation: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: true,
        imageryProvider: new Cesium.OpenStreetMapImageryProvider({
          url: 'https://tile.openstreetmap.org'
        }),
        navigationHelpButton: false,
        timeline: false,
        sceneModePicker: true,
        infoBox: false,
        selectionIndicator: false,
        skyBox: true,
        skyAtmosphere: true
      });

      viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#07111f');
      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(0, 0, 3.5e7)
      });

      bootstrap();
    </script>
  </body>
</html>
